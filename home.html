<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Hub</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary fixed-top">
    <a class="navbar-brand" href="#"><strong>📇 The Contact Hub</strong></a>

    <form class="form-inline ml-auto">
        <input class="form-control mr-sm-2"
               id="searchTxt"
               type="search"
               placeholder="🔍 Search">
    </form>
</nav>



<div class="container mt-4">

    <div class="text-center">
        <img src="image/the_contact_hub_cc_cover.jfif"
             alt="Contact Hub Banner"
             class="img-fluid rounded shadow"
             style="width:100%; max-height:220px; object-fit:cover;">
    </div>
</div>


<div class="container mt-5">
  <div class="row justify-content-end">
  <div class="col-md-8 order-2 order-md-1">
     <hr>
      <h2><strong>📋 All Contacts</strong></h2>
      <hr>

        <div id="container" class="row">


          
      </div>
    </div>
    
    <div class="col-md-4 order-1 order-md-2">

      <div class="card shadow">
        <div class="card-body">
            <h1><strong>Add to Contact</strong></h1>

          <form>
            <div class="form-group">
              <label for="text"><strong>name:</strong></label>
              <input type="text" class="form-control" id="name" placeholder="Enter name" name="name">
            </div>

            <div class="form-group">
              <label for="contact no"contact no><strong>Contact no:</strong></label>
              <input type="no" class="form-control" id="no" placeholder="Enter Contact no" name="no">
            </div>

            
           <button type="button" class="btn btn-primary btn-block" onclick="saveData()">
  Add to Contact
</button>
          </form>

        </div>
      </div>

    </div>

 </div>
 </div>
 

 <script src="logic.js"></script>
